name: Deploy to EC2

on:
  push:
    branches:
      - dev
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Gradle
        run: ./gradlew clean build -x test

        # 빌드된 JAR 파일을 EC2로 복사
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.KEY}}
          source: "build/libs/payment-system-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/c/Cloud/app/" # 실제 프로젝트 경로로 수정
          strip_components: 0

      - name: Restart Systemd Servcie
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.KEY}}
          script: |
            
            # 서비스 재시작 (sudo)
            sudo systemctl restart payment-system
