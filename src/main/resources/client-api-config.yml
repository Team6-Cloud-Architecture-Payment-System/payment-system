# ========================================
# 클라이언트 API 계약 설정
# ========================================
# 경로·요청 필드는 docs/api-spec.md 및 백엔드 구현을 참고합니다.
#
# 공통 응답 래퍼: com.example.paymentsystem.common.dto.ApiResponse
#   - success (boolean)
#   - data (제네릭, 성공 시 페이로드 / 실패 시 보통 null)
#   - message (string)
#
# pathParams: URL 템플릿 {name} 과 순서·이름 매핑 (api-handler / app-config.js)

api:
  base-url: http://localhost:8080

  endpoints:
    # ---------- 주문 (Order) — api-spec.md ----------
    create-order:
      url: /api/orders
      method: POST
      description: 주문 생성
      request:
        fields:
          - name: orderItems
            type: array
            required: true
            description: "[{ productId, quantity }, ...] — 최소 1개"
          - name: usedPoint
            type: number
            required: false
            description: 사용 포인트 (미입력 시 0 등 서버 규칙에 따름)
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ orderId, orderNumber, totalPrice, usedPoint, paymentPrice, orderStatus, orderedCreatedAt }"
            - name: message
              type: string
              required: true

    list-orders:
      url: /api/orders
      method: GET
      description: 내 주문 내역 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ orders[], pagination: { currentPage, size, totalCount, totalPages } }"
            - name: message
              type: string
              required: true

    get-order:
      url: /api/orders/{orderId}
      method: GET
      description: 주문 상세 조회
      pathParams:
        - name: orderId
          description: 주문 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ orderId, orderNumber, totalPrice, usedPoint, paymentPrice, orderStatus, orderedCreatedAt, payment?, orderItems[] }"
            - name: message
              type: string
              required: true

    confirm-order:
      url: /api/orders/{orderId}/confirm
      method: POST
      description: 주문 확정(상태 변경)
      pathParams:
        - name: orderId
          description: 주문 ID
      request:
        fields:
          - name: status
            type: string
            required: true
            description: 예) ORDER_CONFIRMED
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ orderId, orderStatus, confirmedAt }"
            - name: message
              type: string
              required: true

    # ---------- 환불 (Refund) ----------
    create-refund:
      url: /api/payments/{paymentId}/refunds
      method: POST
      description: 환불 요청
      pathParams:
        - name: paymentId
          description: 결제 ID (PortOne payment id 등)
      request:
        fields:
          - name: refundReason
            type: string
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ id, paymentId, refundPrice, refundReason, refundStatus, refundCreatedAt }"
            - name: message
              type: string
              required: true

    list-order-refunds:
      url: /api/orders/{orderId}/refunds
      method: GET
      description: 특정 주문 환불 내역 조회
      pathParams:
        - name: orderId
          description: 주문 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: 단일 환불 레코드 객체 (명세 예시 기준)
            - name: message
              type: string
              required: true

    list-my-refunds:
      url: /api/refunds/me
      method: GET
      description: 내 환불 내역 전체 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ refund[], pagination }"
            - name: message
              type: string
              required: true

    # ---------- 포인트 ----------
    get-my-points:
      url: /api/points/me
      method: GET
      description: 내 포인트 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ userId, myPoint }"
            - name: message
              type: string
              required: true

    list-point-history:
      url: /api/points/me/history
      method: GET
      description: 포인트 거래 내역 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: array
              required: true
              description: "[{ id, orderId, point, type, pointCreatedAt, pointExpiredAt }]"
            - name: message
              type: string
              required: true

    # ---------- 멤버십 ----------
    get-my-membership:
      url: /api/membership/me
      method: GET
      description: 나의 멤버십 등급 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ id, userId, gradeNow, totalPrice, gradeUpdatedAt }"
            - name: message
              type: string
              required: true

    list-membership-tiers:
      url: /api/membership/tiers
      method: GET
      description: 멤버십 등급별 정책 조회
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: array
              required: true
              description: "[{ id, rewardRate, promotionCriteria, gradeName, minPrice, maxPrice }]"
            - name: message
              type: string
              required: true

    # ---------- 인증 ----------
    register:
      url: /api/auth/signup
      method: POST
      description: 회원가입 (명세 POST /api/auth/signup)
      request:
        fields:
          - name: email
            type: string
            required: true
          - name: password
            type: string
            required: true
          - name: name
            type: string
            required: true
          - name: phone
            type: string
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ id, email, name, phone }"
            - name: message
              type: string
              required: true

    login:
      url: /api/auth/login
      method: POST
      description: 로그인
      request:
        fields:
          - name: email
            type: string
            required: true
          - name: password
            type: string
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ accessToken, refreshToken, grantType }"
            - name: message
              type: string
              required: true

    logout:
      url: /api/auth/logout
      method: POST
      description: 로그아웃
      request:
        fields:
          - name: refreshToken
            type: string
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: false
              description: "성공 시 null 일 수 있음 (ApiResponse)"
            - name: message
              type: string
              required: true

    # ---------- 상품 ----------
    list-products:
      url: /api/products
      method: GET
      description: 상품 목록 조회 (현재 백엔드는 data에 상품 배열만 둘 수 있음)
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: array
              required: true
              description: "[{ id, name, price, stock, status, category }] 또는 명세형 { products[], pagination } 을 data 안에 두는 경우 object"
            - name: message
              type: string
              required: true

    get-product:
      url: /api/products/{productId}
      method: GET
      description: 상품 단건 조회
      pathParams:
        - name: productId
          description: 상품 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "단건 상품 DTO (필드명은 ProductDetailResponse 등 백엔드에 따름)"
            - name: message
              type: string
              required: true

    # ---------- 결제 / 웹훅 / PortOne (명세) ----------
    # 웹훅·PortOne 직접 호출 응답은 ApiResponse 가 아님 (200 빈 본문 또는 PortOne 스키마)
    payments-webhook:
      url: /api/payments/webhook
      method: POST
      description: PortOne 웹훅 (결제 이벤트 수신). 응답 200 OK, 본문 없음
      request:
        fields:
          - name: type
            type: string
            required: true
            description: 예) Transaction.Cancelled
          - name: timestamp
            type: string
            required: true
          - name: data
            type: object
            required: true
            description: "{ storeId, paymentId, transactionId 등 }"

    portone-get-payment:
      url: https://api.portone.io/payments/{paymentId}
      method: GET
      description: PortOne 결제 검증 (ApiResponse 아님, PortOne API 응답 본문)
      pathParams:
        - name: paymentId
          description: 결제 건 ID

    portone-cancel-payment:
      url: https://api.portone.io/payments/{paymentId}/cancel
      method: POST
      description: PortOne 결제 취소 (ApiResponse 아님, PortOne API 응답 본문)
      pathParams:
        - name: paymentId
          description: 결제 건 ID
      request:
        fields:
          - name: amount
            type: number
            required: true
          - name: reason
            type: string
            required: true
          - name: skipWebhook
            type: boolean
            required: false

    # ---------- 데모·연동용 (명세 문서에 없음, 기존 정적 페이지 호환) ----------
    get-current-user:
      url: /api/users/me
      method: GET
      description: "명세 외: 현재 사용자(데모). 실제 경로는 백엔드에 맞게 조정"
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: false
              description: "{ customerUid?, email?, name?, phone?, pointBalance? }"
            - name: message
              type: string
              required: true

    create-payment:
      url: /api/orders/{orderId}/payments
      method: POST
      description: "명세 외: 주문 결제 시도(PaymentController). pathParams.orderId 필수. 본문은 서버 DTO에 맞게 payment_price(또는 팀 표준 필드명)"
      pathParams:
        - name: orderId
          description: 주문 ID (URL 경로)
      request:
        fields:
          - name: payment_price
            type: number
            required: true
            description: 결제 금액 (PaymentTryRequest)
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: false
              description: 결제/주문 처리 결과 페이로드 (구현에 따름)
            - name: message
              type: string
              required: true

    confirm-payment:
      url: /api/payments/{paymentId}/confirm
      method: POST
      description: "명세 외: 결제 확정(검증)용 플레이스홀더 — 구현 시 URL 조정"
      pathParams:
        - name: paymentId
          description: 결제 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: false
              description: "{ orderId?, status? } 등 구현에 따름"
            - name: message
              type: string
              required: true

    cancel-payment:
      url: https://api.portone.io/payments/{paymentId}/cancel
      method: POST
      description: "PortOne 결제 취소 API (명세 POST .../cancel 과 동일 호스트)"
      pathParams:
        - name: paymentId
          description: 결제 ID
      request:
        fields:
          - name: amount
            type: number
            required: true
          - name: reason
            type: string
            required: true
          - name: skipWebhook
            type: boolean
            required: false

    list-plans:
      url: /api/subscription-plans
      method: GET
      description: "명세 외: 구독 플랜 목록(데모)"
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: array
              required: true
              description: "[{ planId, name, amount, billingCycle }, ...]"
            - name: message
              type: string
              required: true

    create-subscription:
      url: /api/subscriptions
      method: POST
      description: "명세 외: 구독 생성(데모)"
      request:
        fields:
          - name: customerUid
            type: string
            required: true
          - name: planId
            type: string
            required: true
          - name: billingKey
            type: string
            required: true
          - name: amount
            type: number
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ subscriptionId, ... }"
            - name: message
              type: string
              required: true

    get-subscription:
      url: /api/subscriptions/{subscriptionId}
      method: GET
      description: "명세 외: 구독 단건 조회(데모)"
      pathParams:
        - name: subscriptionId
          description: 구독 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ subscriptionId, customerUid, planId, paymentMethodId?, status, amount, currentPeriodEnd }"
            - name: message
              type: string
              required: true

    update-subscription:
      url: /api/subscriptions/{subscriptionId}
      method: PATCH
      description: "명세 외: 구독 상태 변경(데모)"
      pathParams:
        - name: subscriptionId
          description: 구독 ID
      request:
        fields:
          - name: action
            type: string
            required: true
          - name: reason
            type: string
            required: false
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: false
              description: "{ subscriptionId?, status? }"
            - name: message
              type: string
              required: true

    create-billing:
      url: /api/subscriptions/{subscriptionId}/billings
      method: POST
      description: "명세 외: 구독 청구(데모)"
      pathParams:
        - name: subscriptionId
          description: 구독 ID
      request:
        fields:
          - name: periodStart
            type: string
            required: true
          - name: periodEnd
            type: string
            required: true
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ billingId, paymentId?, amount, status }"
            - name: message
              type: string
              required: true

    list-billing-history:
      url: /api/subscriptions/{subscriptionId}/billings
      method: GET
      description: "명세 외: 청구 내역(데모)"
      pathParams:
        - name: subscriptionId
          description: 구독 ID
      response:
        body:
          fields:
            - name: success
              type: boolean
              required: true
            - name: data
              type: object
              required: true
              description: "{ billings: [] }"
            - name: message
              type: string
              required: true
