<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>로그인 - 견생보감</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/popart-auth.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/cookie-util.js}"></script>
    <script th:src="@{/js/app-config.js}"></script>
    <script th:src="@{/js/ui-effects.js}"></script>
    <script th:src="@{/js/api-handler.js}"></script>
    <script th:src="@{/js/api-validator.js}"></script>
</head>
<body>
    <!-- Pop Art Loading Fallback -->
    <div id="pop-loader" class="pop-loader-overlay">
        <div class="pop-loader-text">LOADING...</div>
        <div class="pop-progress-bar-container">
            <div id="pop-progress-fill" class="pop-progress-bar-fill"></div>
        </div>
    </div>

    <div class="auth-layout">
        <div class="auth-container">
            <div class="auth-header-wrapper">
                <h1 class="pop-title">
                    <a href="/">견생보감</a>
                </h1>
                <p class="pop-subtitle">6조 커머스 플랫폼</p>
            </div>

            <div class="pop-card">
                <div class="pop-card-header">LOGIN</div>
                <div class="pop-card-body">
                    <div id="error-message" class="pop-alert pop-alert-danger" style="display: none;">
                        <strong>⚠️ ERROR</strong><br>
                        <span id="error-text">이메일 또는 비밀번호가 올바르지 않습니다.</span>
                    </div>

                    <form id="login-form" onsubmit="handleLogin(event)">
                        <div class="pop-form-group">
                            <label class="pop-label">EMAIL</label>
                            <input type="email" id="email" class="pop-input" placeholder="admin@test.com" required autofocus value="admin@test.com">
                        </div>
                        <div class="pop-form-group">
                            <label class="pop-label">PASSWORD</label>
                            <input type="password" id="password" class="pop-input" placeholder="••••••••" required value="admin">
                        </div>

                        <button type="submit" class="pop-btn">로그인</button>
                    </form>

                    <div style="margin-top: 1.5rem;">
                        <p class="pop-link-text">계정이 없으신가요?</p>
                        <a href="/pages/register" class="pop-btn pop-btn-outline" style="display: block; text-align: center; text-decoration: none;">회원가입</a>
                    </div>

                    <div class="pop-test-account">
                        <p style="margin-bottom: 0.5rem;">
                            <strong>TEST ACCOUNT:</strong>
                        </p>
                        <ul style="list-style: none; padding: 0;">
                            <li>admin@test.com / admin</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 2rem; display: none;">
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" style="display: none;">🌙</button>
            </div>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // 에러 메시지 숨기기
            errorMessage.style.display = 'none';

            try {
                const result = await makeApiRequest('login', {
                    body: {
                        email: email,
                        password: password
                    }
                });

                // YML 스키마 기반 자동 검증
                if (!validateApiResponse('login', result)) {
                    errorText.textContent = 'API 응답 형식이 올바르지 않습니다.';
                    errorMessage.style.display = 'block';
                    return;
                }

                if (result.success) {
                    const payload = result.data;
                    const accessToken =
                        payload && typeof payload === 'object' ? payload.accessToken : null;
                    const refreshToken =
                        payload && typeof payload === 'object' ? payload.refreshToken : null;

                    if (accessToken) {
                        saveToken(accessToken);
                        if (refreshToken) {
                            saveRefreshToken(refreshToken);
                        }

                        // Play Pop Art loading animation
                        const loader = document.getElementById('pop-loader');
                        const fill = document.getElementById('pop-progress-fill');
                        if (loader && fill) {
                            loader.classList.add('active');

                            // Trigger CSS transition for progress bar
                            setTimeout(() => {
                                fill.style.width = '100%';
                            }, 50);

                            setTimeout(() => {
                                window.location.href = '/home';
                            }, 1500);
                        } else {
                            window.location.href = '/home';
                        }
                    } else {
                        errorText.textContent = '토큰을 받을 수 없습니다.';
                        errorMessage.style.display = 'block';
                    }
                } else {
                    // 로그인 실패
                    errorText.textContent = result.message || '이메일 또는 비밀번호가 올바르지 않습니다.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('로그인 오류:', error);
                errorText.textContent = '로그인 중 오류가 발생했습니다.';
                errorMessage.style.display = 'block';
            }
        }

        // 이미 로그인되어 있으면 홈으로 이동 (쿠키 체크)
        if (getToken()) {
            window.location.href = '/home';
        }
    </script>
</body>
</html>
