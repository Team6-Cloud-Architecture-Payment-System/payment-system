<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title th:replace="${title}">6하은칙</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Righteous&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- PortOne SDK (v2) -->
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>

    <!-- Common Scripts -->
    <script th:src="@{/js/cookie-util.js}"></script>
    <script th:src="@{/js/app-config.js}"></script>
    <script th:src="@{/js/api-handler.js}"></script>
    <script th:src="@{/js/api-validator.js}"></script>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/portone-sdk.js}"></script>
    <script th:src="@{/js/auth-check.js}"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="pop-title" style="color: #fff; margin: 0; font-size: 2rem; -webkit-text-stroke: 1px #000; text-shadow: 3px 3px 0px #000;">6하은칙</span>
            </a>

            <ul class="navbar-nav">
                <li><a href="/home" class="nav-link">Home</a></li>
                <li><a href="/pages/shop" class="nav-link">Shop</a></li>
                <li><a href="/pages/orders" class="nav-link">Orders</a></li>
                <li><a href="/pages/plans" class="nav-link">Plans</a></li>
                <li><a href="/pages/subscribe" class="nav-link">Subscribe</a></li>
                <li><a href="/pages/subscriptions" class="nav-link">Subscriptions</a></li>
            </ul>

            <div class="navbar-actions">
                <div class="config-badge-container">
                    <span class="config-badge skeleton" style="width: 100px; height: 24px;"></span>
                </div>
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container (2-Column Layout) -->
    <div class="main-container">
        <!-- Left: Page Content -->
        <div class="content-area">
            <div th:replace="${content}"></div>
        </div>

        <!-- Right: API Panel -->
        <div class="api-panel">
            <div class="panel-section">
                <h3 class="panel-title">📡 현재 엔드포인트</h3>
                <div id="current-endpoint" class="endpoint-badge">아직 요청 없음</div>
            </div>
            <div class="panel-section">
                <h3 class="panel-title">📤 요청</h3>
                <textarea id="request-body" class="api-textarea"></textarea>
            </div>
            <div class="panel-section">
                <h3 class="panel-title">📥 응답</h3>
                <pre id="response-output" class="response-box">요청 대기 중...</pre>
            </div>
        </div>
    </div>
</body>
</html>
