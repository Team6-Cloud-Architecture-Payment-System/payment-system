<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title th:replace="${title}">견생보감</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Righteous&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- PortOne SDK (v2) -->
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>

    <!-- Common Scripts -->
    <script th:src="@{/js/cookie-util.js}"></script>
    <script th:src="@{/js/app-config.js}"></script>
    <script th:src="@{/js/api-handler.js}"></script>
    <script th:src="@{/js/api-validator.js}"></script>
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/portone-sdk.js}"></script>
    <script th:src="@{/js/auth-check.js}"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <span class="pop-title" style="color: #fff; margin: 0; font-size: 2rem; -webkit-text-stroke: 1px #000; text-shadow: 3px 3px 0px #000;">🐶 견생보감</span>
            </a>

            <ul class="navbar-nav">
                <li><a href="/home" class="nav-link">Home</a></li>
                <li><a href="/pages/orders" class="nav-link">Orders</a></li>
                <li><a href="/pages/plans" class="nav-link">Plans</a></li>
                <!-- <li><a href="/pages/subscribe" class="nav-link">Subscribe</a></li> -->
                <!-- <li><a href="/pages/subscriptions" class="nav-link">Subscriptions</a></li> -->
                <li><a href="/pages/mypage" class="nav-link">My Page</a></li>
            </ul>

            <div class="navbar-actions">

            </div>
        </div>
    </nav>

    <!-- Main Content Container (1-Column Layout for Dog Shop) -->
    <div class="main-container">
        <div class="content-area">
            <div th:replace="${content}"></div>
        </div>
    </div>

    <!-- Global Footer -->
    <footer class="footer">
        <div class="footer-content text-center">
            <h4 style="font-family: 'Righteous', display; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 0.5rem; text-transform: uppercase;">🐾 Team 6하은칙</h4>
            <p style="font-weight: 800; font-size: 1rem; color: var(--text-secondary);">임하은, 선경안, 정호진, 정태규, 정채림</p>
        </div>
    </footer>
</body>
</html>
