<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <title>회원가입 - 6하은칙</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/popart-auth.css}">
    <script th:src="@{/js/theme.js}"></script>
    <script th:src="@{/js/cookie-util.js}"></script>
    <script th:src="@{/js/app-config.js}"></script>
    <script th:src="@{/js/api-handler.js}"></script>
    <script th:src="@{/js/api-validator.js}"></script>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-container">
            <div class="auth-header-wrapper">
                <h1 class="pop-title">
                    <a href="/">6하은칙</a>
                </h1>
                <p class="pop-subtitle">6조 커머스 플랫폼</p>
            </div>

            <div class="pop-card">
                <div class="pop-card-header">REGISTER</div>
                <div class="pop-card-body">
                    <div id="error-message" class="pop-alert pop-alert-danger" style="display: none;">
                        <strong>⚠️ ERROR</strong><br>
                        <span id="error-text">오류가 발생했습니다.</span>
                    </div>

                    

                    <form id="register-form" onsubmit="handleRegister(event)">
                        <div class="pop-form-group">
                            <label class="pop-label">NAME</label>
                            <input type="text" id="name" class="pop-input" placeholder="홍길동" required>
                        </div>
                        <div class="pop-form-group">
                            <label class="pop-label">EMAIL</label>
                            <input type="email" id="email" class="pop-input" placeholder="example@test.com" required>
                        </div>
                        <div class="pop-form-group">
                            <label class="pop-label">PASSWORD</label>
                            <input type="password" id="password" class="pop-input" placeholder="••••••••" required>
                        </div>
                        <div class="pop-form-group">
                            <label class="pop-label">PASSWORD CONFIRM</label>
                            <input type="password" id="password-confirm" class="pop-input" placeholder="••••••••" required>
                        </div>
                        <div class="pop-form-group">
                            <label class="pop-label">PHONE</label>
                            <input type="tel" id="phone" class="pop-input" placeholder="010-1234-5678">
                        </div>

                        <button type="submit" class="pop-btn">
                            회원가입
                        </button>
                    </form>

                    <div style="margin-top: 1.5rem;">
                        <p class="pop-link-text">이미 계정이 있으신가요?</p>
                        <a href="/pages/login" class="pop-btn pop-btn-outline" style="display: block; text-align: center; text-decoration: none;">로그인하기</a>
                    </div>

                    <div class="pop-test-account">
                        <p style="margin-bottom: 0.5rem;">
                            <strong>TEST ACCOUNT:</strong>
                        </p>
                        <ul style="list-style: none; padding: 0;">
                            <li>admin@test.com / admin</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 2rem; display: none;">
                <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" style="display: none;">🌙</button>
            </div>
        </div>
    </div>

    <script>
        async function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('password-confirm').value;
            const phone = document.getElementById('phone').value;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // 에러 메시지 숨기기
            errorMessage.style.display = 'none';

            // 비밀번호 확인
            if (password !== passwordConfirm) {
                errorText.textContent = '비밀번호가 일치하지 않습니다.';
                errorMessage.style.display = 'block';
                return;
            }

            try {
                const result = await makeApiRequest('register', {
                    body: {
                        name: name,
                        email: email,
                        password: password,
                        phone: phone
                    }
                });

                // YML 스키마 기반 자동 검증
                if (!validateApiResponse('register', result)) {
                    errorText.textContent = 'API 응답 형식이 올바르지 않습니다.';
                    errorMessage.style.display = 'block';
                    return;
                }

                if (result.success) {
                    // 회원가입 성공 - 로그인 페이지로 이동
                    alert('회원가입 성공! 로그인 페이지로 이동합니다.');
                    window.location.href = '/pages/login';
                } else {
                    // 회원가입 실패
                    errorText.textContent = result.message || '회원가입에 실패했습니다.';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('회원가입 오류:', error);

                // API 미구현 (501) 에러 처리
                if (error.message && error.message.includes('501')) {
                    errorText.textContent = '⚠️ 회원가입 API가 아직 구현되지 않았습니다. 백엔드 구현 후 다시 시도해주세요.';
                } else {
                    errorText.textContent = '회원가입 중 오류가 발생했습니다.';
                }
                errorMessage.style.display = 'block';
            }
        }

        // 이미 로그인되어 있으면 홈으로 이동
        if (getToken()) {
            window.location.href = '/home';
        }
    </script>
</body>
</html>
