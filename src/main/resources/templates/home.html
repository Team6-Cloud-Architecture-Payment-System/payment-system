<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>홈 - Commerce Demo</title>
</head>
<body>
    <div th:fragment="content">
        <h1 id="shop-title" class="anim-fade-in-up" style="font-size: 2.5rem; margin-bottom: 2rem; opacity: 0;">🐶 Dog Supplies Shop</h1>

            <div class="card-grid" id="product-list" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;"></div>

            <!-- Cart Modal -->
            <div id="cart-modal" class="cart-modal-overlay" onclick="if(event.target === this) closeCartModal()">
                <div id="cart-modal-content" class="cart-modal-content">
                    <button class="cart-modal-close" onclick="closeCartModal()">&times;</button>
                    <h3 style="margin-bottom: 1.5rem; font-family: 'Righteous', display; font-size: 1.8rem; text-transform: uppercase;">🛒 장바구니</h3>

                    <div id="cart-items" style="margin-bottom: 1rem; max-height: 40vh; overflow-y: auto;">
                        <p style="color: var(--text-secondary); text-align: center; padding: 1rem 0;">장바구니가 비어 있습니다.</p>
                    </div>

                    <div class="cart-total" style="margin-top: 1rem; padding-top: 1rem; border-top: 3px solid var(--border);">
                        <span>총 상품 금액:</span>
                        <span id="cart-total">₩0</span>
                    </div>

                    <div style="margin-top: 1rem; padding: 1rem; border: 3px solid var(--border); border-radius: var(--radius-md); box-shadow: 4px 4px 0px var(--shadow);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: bold;">
                            <span>보유 포인트:</span>
                            <span id="current-point-display">0 P</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <input type="number" id="use-point-input" class="form-input" style="flex: 1; padding: 0.5rem;" value="0" min="0" step="1000" onchange="validatePointInput()">
                            <span style="font-weight: bold;">P 사용</span>
                            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.85rem; border-width: 2px; font-weight: bold; border-radius: var(--radius-sm);" onclick="useAllPoints()">전액사용</button>
                        </div>
                    </div>

                    <div class="cart-total" style="margin-top: 1rem; font-size: 1.5rem;">
                        <span>최종 결제 금액:</span>
                        <span id="final-amount">₩0</span>
                    </div>

                    <button id="create-order-btn" class="btn btn-primary" onclick="createOrder()" style="width: 100%; margin-top: 1.5rem; font-size: 1.2rem;">
                        📦 주문 생성
                    </button>
                </div>
            </div>

    <script>
        let products = [];
        const cart = {};

        // 현재 사용자 정보 (서버에서 로드)
        let currentUser = null;

        // 페이지 로드 시 사용자 정보 가져오기
        async function loadCurrentUser() {
            try {
                // 토큰이 없으면 사용자 정보 호출을 스킵 (불필요한 403 방지)
                const token = typeof getToken === 'function' ? getToken() : null;
                if (!token) {
                    currentUser = null;
                    return;
                }

                // 토큰이 만료/손상된 경우 get-current-user 호출 자체를 스킵
                // (JWT payload의 exp는 보통 seconds 단위)
                const payload =
                    typeof decodeJWT === 'function'
                        ? decodeJWT(token)
                        : null;
                if (payload && payload.exp) {
                    const expMs = payload.exp * 1000;
                    if (Date.now() > expMs) {
                        if (typeof removeToken === 'function') removeToken();
                        currentUser = null;
                        return;
                    }
                } else if (!payload) {
                    // 디코딩이 안 되면 잘못된 토큰일 가능성이 높음
                    currentUser = null;
                    return;
                }

                let result = null;
                if (typeof getSharedCurrentUser === 'function') {
                    result = await getSharedCurrentUser();
                } else {
                    result = await makeApiRequest('get-current-user', {});
                }

                // YML 스키마 기반 자동 검증 (result 원본 구조 사용)
                if (!validateApiResponse('get-current-user', result)) {
                    throw new Error('API 응답 형식이 올바르지 않습니다.');
                }

                // data 객체가 래핑된 경우 추출
                currentUser = result?.data || result || {};

                if (currentUser && currentUser.point !== undefined) {
                    document.getElementById('current-point-display').textContent = `${currentUser.point.toLocaleString()} P`;
                }

            } catch (error) {
                console.error('Failed to load user info:', error);
                currentUser = null;
            }
        }

        // API에서 상품 목록 로드 (구현 필수)
        async function loadProductsFromApi() {
            try {
                const result = await makeApiRequest('list-products', {});

                // 백엔드 응답이 `[{...}]` 형태가 아니라 `{ success: true, data: [{...}] }` 형태일 수 있음
                const extractedProducts =
                    result && !Array.isArray(result) && Array.isArray(result.data)
                        ? result.data
                        : result;

                // YML 스키마 기반 자동 검증 (형식이 다르면 여기서 경고만 남기고 계속 렌더링 시도)
                // client-api-config.yml의 list-products는 ApiResponse wrapper 기준을 가정
                validateApiResponse('list-products', result);

                if (extractedProducts && Array.isArray(extractedProducts)) {
                    products = extractedProducts;
                    return true;
                } else {
                    showNotification('상품 목록이 배열 형식이 아닙니다', 'error');
                    return false;
                }
            } catch (error) {
                console.error('API 미구현:', error);
                showNotification('상품 목록 조회 API를 먼저 구현해주세요', 'error');
                return false;
            }
        }

        // Render products
        function renderProducts() {
            const productList = document.getElementById('product-list');

            if (products.length === 0) {
                // yml 설정에서 엔드포인트 가져오기
                const endpoint = window.APP_RUNTIME?.config?.demoApi?.endpoints['list-products'] || '/api/products';

                productList.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                        <h3 style="color: var(--text-secondary); margin-bottom: 1rem;">상품 데이터 없음</h3>
                        <p style="color: var(--text-secondary);">
                            <strong>GET ${endpoint}</strong> API를 구현하면 상품이 표시됩니다.
                        </p>
                        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">
                            응답 형식: [{ id, name, price, stock, imgUrl, category }]
                        </p>
                    </div>
                `;
                return;
            }

            productList.innerHTML = products.map((product, idx) => {
                const stockStatus = product.stock > 0
                    ? `<span style="color: var(--success, #28a745);">재고: ${product.stock}개</span>`
                    : `<span style="color: var(--error, #dc3545);">품절</span>`;

                const imgTag = product.imgUrl
                    ? `<img src="${product.imgUrl}" alt="${product.name}" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 1rem;" />`
                    : `<div style="width: 100%; height: 200px; background-color: #eee; border-radius: 8px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; color: #999;">No Image</div>`;

                return `
                    <div class="product-card stagger-item" style="background: var(--bg-primary, #fff); border: 1px solid var(--border-color, #eee); border-radius: 12px; padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; animation-delay: ${idx * 80}ms;">
                        ${imgTag}
                        <div style="font-size: 0.8rem; color: var(--text-secondary, #666); margin-bottom: 0.25rem;">${product.category || '기타'}</div>
                        <div class="card-header" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 0.5rem; word-break: keep-all;">${product.name}</div>
                        <div class="price" style="font-size: 1.2rem; font-weight: bold; color: var(--primary, #007bff); margin-bottom: 0.5rem;">₩${product.price.toLocaleString()}</div>
                        <div style="margin-bottom: 1rem; font-size: 0.9rem;">${stockStatus}</div>

                        <div class="quantity-control" style="margin-top: auto; display: flex; align-items: center; justify-content: space-between; background: var(--bg-secondary, #f8f9fa); border-radius: 8px; padding: 0.5rem;">
                            <button class="quantity-btn" style="width: 32px; height: 32px; border: none; background: white; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: var(--text-primary);" onclick="updateQuantity('${product.id}', -1)"
                                ${product.stock === 0 ? 'disabled' : ''}>-</button>
                            <input type="number" class="quantity-input" id="qty-${product.id}"
                                style="width: 50px; text-align: center; border: none; background: transparent; font-size: 1rem; font-weight: bold;" value="0" min="0" max="${product.stock}" readonly>
                            <button class="quantity-btn" style="width: 32px; height: 32px; border: none; background: white; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: var(--text-primary);" onclick="updateQuantity('${product.id}', 1)"
                                ${product.stock === 0 ? 'disabled' : ''}>+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateQuantity(productId, delta) {
            const product = products.find(p => String(p.id) === String(productId));
            if (!product) return;

            const input = document.getElementById(`qty-${productId}`);
            let qty = parseInt(input.value) + delta;

            // 재고 수량 체크
            if (qty < 0) qty = 0;
            if (qty > product.stock) {
                showNotification(`⚠️ 재고가 ${product.stock}개만 남았습니다`, 'warning');
                qty = product.stock;
            }

            input.value = qty;
            cart[productId] = qty;

            if (delta > 0 && qty > 0) {
                animateCartBadge();
            }

            updateCartSummary();
        }

        function calculateTotal() {
            let total = 0;
            Object.keys(cart).forEach(productId => {
                const qty = cart[productId];
                if (qty > 0) {
                    const product = products.find(p => String(p.id) === String(productId));
                    if (product) {
                        total += product.price * qty;
                    }
                }
            });
            return total;
        }

        // 전액 사용 버튼 클릭
        function useAllPoints() {
            let currentTotal = calculateTotal();
            if (currentTotal === 0) return;

            const maxPoint = currentUser && currentUser.point !== undefined ? currentUser.point : 0;

            if (maxPoint >= currentTotal) {
                // 보유 포인트가 총 결제금액보다 크거나 같으면 전액 사용(0원 결제) -> 1000원 단위 제약 예외
                document.getElementById('use-point-input').value = currentTotal;
                updateCartSummary();
            } else {
                // 보유 포인트가 부족하면 1000 단위로 사용하되, 잔액이 1~999원 사이로 남지 않게 조정
                let usePoint = Math.floor(maxPoint / 1000) * 1000;
                const remainder = currentTotal - usePoint;
                if (remainder > 0 && remainder < 1000) {
                    usePoint = Math.max(0, Math.floor((currentTotal - 1000) / 1000) * 1000);
                }
                document.getElementById('use-point-input').value = usePoint;
                updateCartSummary();
            }
        }

        function validatePointInput() {
            const input = document.getElementById('use-point-input');
            let value = parseInt(input.value) || 0;
            const maxPoint = currentUser && currentUser.point !== undefined ? currentUser.point : 0;
            let currentTotal = calculateTotal();

            if (value === currentTotal && maxPoint >= currentTotal) {
                // 전액 사용 시 1000 단위 예외 허용 (0원 결제)
            } else {
                // 1000 단위로 조정
                value = Math.floor(value / 1000) * 1000;
            }

            if (value < 0) value = 0;
            if (value > maxPoint && value !== currentTotal) value = Math.floor(maxPoint / 1000) * 1000;
            if (value > currentTotal) value = Math.floor(currentTotal / 1000) * 1000;

            input.value = value;
            updateCartSummary();
        }

        function updateCartSummary() {
            const cartItemsDiv = document.getElementById('cart-items');
            const cartTotalSpan = document.getElementById('cart-total');
            const finalAmountSpan = document.getElementById('final-amount');

            let total = calculateTotal();
            let totalQty = 0;
            let html = '';

            Object.keys(cart).forEach(productId => {
                const qty = cart[productId];
                if (qty > 0) {
                    totalQty += qty;
                    const product = products.find(p => String(p.id) === String(productId));
                    if (product) {
                        const subtotal = product.price * qty;
                        html += `
                            <div class="cart-item" style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: 600;">
                                <span>${product.name} <span style="font-weight: 800;">x${qty}</span></span>
                                <span>₩${subtotal.toLocaleString()}</span>
                            </div>
                        `;
                    }
                }
            });

            cartItemsDiv.innerHTML = html || '<p style="color: var(--text-secondary); text-align: center; padding: 1rem 0;">장바구니가 비어 있습니다.</p>';
            cartTotalSpan.textContent = `₩${total.toLocaleString()}`;

            let usePoint = parseInt(document.getElementById('use-point-input').value) || 0;
            // validate point usage just in case total dropped below used points
            if (usePoint > total) {
                 usePoint = Math.floor(total / 1000) * 1000;
                 document.getElementById('use-point-input').value = usePoint;
            }

            const finalAmount = total - usePoint;
            if (finalAmountSpan) {
                finalAmountSpan.textContent = `₩${finalAmount.toLocaleString()}`;
            }

            // 잔액 1~999원 결제 방지 로직 (PG 한도 문제 회피 전략 1)
            let warningMsg = document.getElementById('point-warning-msg');
            if (!warningMsg) {
                warningMsg = document.createElement('div');
                warningMsg.id = 'point-warning-msg';
                warningMsg.style.color = 'var(--danger)';
                warningMsg.style.fontSize = '0.85rem';
                warningMsg.style.marginTop = '0.5rem';
                warningMsg.style.fontWeight = 'bold';
                const inputContainer = document.getElementById('use-point-input').parentElement.parentElement;
                inputContainer.appendChild(warningMsg);
            }

            const orderBtn = document.getElementById('create-order-btn');

            // 총 금액이 존재하지만 포인트 차감후 최종 금액이 1원~999원인 경우 막음
            if (finalAmount > 0 && finalAmount < 1000 && totalQty > 0) {
                warningMsg.textContent = '❌ 실결제금액이 1000원 미만일 경우 결제가 불가능합니다.';
                if (orderBtn) {
                    orderBtn.disabled = true;
                    orderBtn.style.opacity = '0.5';
                    orderBtn.style.cursor = 'not-allowed';
                }
            } else {
                warningMsg.textContent = '';
                if (orderBtn) {
                    const isDisabled = totalQty === 0;
                    orderBtn.disabled = isDisabled;
                    orderBtn.style.opacity = isDisabled ? '0.5' : '1';
                    orderBtn.style.cursor = isDisabled ? 'not-allowed' : 'pointer';
                }
            }

            // Update Badge Count
            const badge = document.getElementById('cart-badge');
            if (badge) {
                badge.textContent = totalQty;
                badge.style.display = totalQty > 0 ? 'flex' : 'none';
            }
        }

        // API 목록 동적 생성
        async function populateApiList() {
            const apiListElement = document.getElementById('api-list-shop');
            if (!apiListElement) return;

            try {
                // config 로드 대기
                const config = await getConfig();
                const endpoints = config?.api?.endpoints;

                if (!endpoints) {
                    apiListElement.innerHTML = '';
                    return;
                }

                // shop.html에 필요한 API들 (홈으로 합쳐졌으므로 동일하게 유지)
                const requiredApis = ['list-products', 'create-order'];
                const apiItems = [];

                requiredApis.forEach(apiKey => {
                    const apiConfig = endpoints[apiKey];
                    if (apiConfig && apiConfig.url) {
                        const method = apiConfig.method || 'GET';
                        const description = apiConfig.description || '';
                        apiItems.push(`<li><code>${method} ${apiConfig.url}</code> - ${description}</li>`);
                    }
                });

                // API가 정의되어 있으면 표시, 없으면 빈 문자열
                apiListElement.innerHTML = apiItems.join('');
            } catch (error) {
                console.error('API 목록 로드 실패:', error);
                apiListElement.innerHTML = '';
            }
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', () => {
            // API 목록 동적 생성 (비동기)
            populateApiList();

            // Inject Cart Button into Navbar
            const navbarActions = document.querySelector('.navbar-actions');
            if (navbarActions) {
                const cartBtnContainer = document.createElement('div');
                cartBtnContainer.innerHTML = `
                    <button id="cart-modal-btn" class="btn btn-outline" style="padding: 0.5rem 1rem; position: relative; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; margin-right: 1rem;" onclick="toggleCartModal()">
                        🛒 <span style="font-size: 0.9rem; margin-left: 0.5rem; font-family: 'Righteous', display;">CART</span>
                        <span id="cart-badge" style="position: absolute; top: -8px; right: -8px; background: var(--primary); color: var(--bg-primary); border-radius: 50%; width: 24px; height: 24px; font-size: 0.8rem; display: none; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--bg-primary); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);">0</span>
                    </button>
                `;
                navbarActions.appendChild(cartBtnContainer.firstElementChild);
            }
        });

        function openCartModal() {
            const modal = document.getElementById('cart-modal');
            const content = document.getElementById('cart-modal-content');
            if (!modal) return;

            // 오버레이 fade-in (opacity만, transform 없음 — stacking context 생성 방지)
            modal.style.opacity = '0';
            modal.classList.add('active');
            requestAnimationFrame(() => {
                modal.style.transition = 'opacity 0.25s ease';
                modal.style.opacity = '1';
            });

            // 콘텐츠 박스 scale-in (인라인 style)
            if (content) {
                content.style.transition = 'none';
                content.style.transform = 'scale(0.93) translateY(-10px)';
                content.style.opacity = '0';
                setTimeout(() => {
                    content.style.transition = 'transform 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';
                    content.style.transform = 'scale(1) translateY(0)';
                    content.style.opacity = '1';
                }, 10);
            }
        }

        function closeCartModal() {
            const modal = document.getElementById('cart-modal');
            const content = document.getElementById('cart-modal-content');
            if (!modal) return;

            // 콘텐츠 박스 scale-out
            if (content) {
                content.style.transition = 'transform 0.25s ease, opacity 0.2s ease';
                content.style.transform = 'scale(0.95) translateY(-5px)';
                content.style.opacity = '0';
            }

            // 오버레이 fade-out
            modal.style.transition = 'opacity 0.25s ease';
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.classList.remove('active');
                modal.style.opacity = '';
                modal.style.transition = '';
                // 인라인 style 리셋 (다음 오픈 준비)
                if (content) {
                    content.style.transition = '';
                    content.style.transform = '';
                    content.style.opacity = '';
                }
            }, 280);
        }

        function toggleCartModal() {
            const modal = document.getElementById('cart-modal');
            if (!modal) return;
            if (modal.classList.contains('active')) {
                closeCartModal();
            } else {
                openCartModal();
            }
        }

        function animateCartBadge() {
            const badge = document.getElementById('cart-badge');
            if (badge) {
                badge.style.transform = 'scale(1.5)';
                setTimeout(() => {
                    badge.style.transform = 'scale(1)';
                }, 200);
            }
        }

        async function createOrder() {
            // 서버로 보낼 아이템 (productId와 quantity만)
            const items = [];

            Object.keys(cart).forEach(productId => {
                const qty = cart[productId];
                if (qty > 0) {
                    items.push({
                        productId: Number(productId),
                        quantity: qty
                    });
                }
            });

            if (items.length === 0) {
                showNotification('⚠️ Cart is empty', 'warning');
                return;
            }

            if (!currentUser) {
                showNotification('⚠️ 사용자 정보를 먼저 로드해주세요 (/api/auth/me 구현 필요)', 'warning');
                return;
            }

            const usePoint = parseInt(document.getElementById('use-point-input').value) || 0;

            // 서버로 전송 (productId, quantity, usedPoint)
            // 가격 계산과 재고 확인은 서버에서 처리
            const orderData = {
                orderItems: items,
                usedPoint: usePoint
            };

            try {
                const result = await makeApiRequest('create-order', {
                    body: orderData
                });

                // YML 스키마 기반 자동 검증
                if (!validateApiResponse('create-order', result)) {
                    throw new Error('API 응답 형식이 올바르지 않습니다.');
                }

                const orderId = result?.data?.orderId ?? result?.orderId;
                if (orderId != null) {
                    showNotification('주문 생성 완료!', 'success');
                    setTimeout(() => {
                        window.location.href = `/pages/orders`;
                    }, 1000);
                }
            } catch (error) {
                console.error('Failed to create order:', error);
            }
        }

        // Initialize
        async function initShop() {
            // 1. 즉시 스켈레톤 표시
            const productList = document.getElementById('product-list');
            productList.innerHTML = generateProductSkeletons(6);

            // 2. 제목 애니메이션 트리거
            const titleEl = document.getElementById('shop-title');
            if (titleEl) titleEl.style.opacity = '1';

            // 3. API 호출 + 최소 0.5초 딜레이
            await withMinDelay(async () => {
                await loadCurrentUser();
                await loadProductsFromApi();
            });

            // 4. 스켈레톤 fadeOut 후 실제 콘텐츠 렌더
            productList.classList.add('skeleton-fade-out');
            await new Promise(r => setTimeout(r, 300));
            productList.classList.remove('skeleton-fade-out');

            renderProducts();
            updateCartSummary();
        }

        initShop();
    </script>
    </div>
</body>
</html>
