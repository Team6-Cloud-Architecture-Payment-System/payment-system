<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>주문 - 6하은칙</title>
</head>
<body>
    <div th:fragment="content">
        <h1 style="font-family: 'Righteous', display; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 4px solid var(--border); padding-bottom: 0.5rem; display: inline-block; padding-right: 2rem;">📦 주문 관리</h1>

        <!-- 주문 목록 -->
        <div class="card">
            <div class="card-header">내 주문 목록</div>
            <div class="card-body">
                <div id="order-list-loading" style="text-align: center; padding: 3rem; color: var(--text-primary); font-weight: 800; font-size: 1.2rem;">
                    주문 목록을 불러오는 중... <span class="skeleton" style="display:inline-block; width:50px; height:1rem; border-radius: 4px; border: 2px solid var(--border);"></span>
                </div>
                <div id="order-list-container" style="display: none; overflow-x: auto; margin-top: 1rem;">
                    <table style="width: 100%; border-collapse: separate; border-spacing: 0; border: 3px solid var(--border); border-radius: var(--radius-md); box-shadow: 4px 4px 0px var(--shadow); background: var(--bg-primary);">
                        <thead>
                            <tr style="background: var(--text-primary); color: var(--bg-primary);">
                                <th style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: left; font-weight: 800;">주문 번호</th>
                                <th style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right; font-weight: 800;">금액</th>
                                <th style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right; font-weight: 800;">포인트</th>
                                <th style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: center; font-weight: 800;">상태</th>
                                <th style="padding: 1rem; border-bottom: 3px solid var(--border); text-align: center; font-weight: 800;">작업</th>
                            </tr>
                        </thead>
                        <tbody id="order-list-body">
                        <!-- 주문 목록이 여기에 렌더링됩니다 -->
                        </tbody>
                    </table>
                </div>
                <div id="order-list-empty" style="display: none; text-align: center; padding: 4rem; background: var(--bg-tertiary); border: 3px dashed var(--border); border-radius: var(--radius-md); font-weight: 800; font-size: 1.2rem; margin-top: 1rem;">
                    주문 내역이 없습니다. <br><br>
                    <a href="/home" class="btn btn-primary" style="margin-top: 1rem;">상점으로 가기</a>
                </div>
            </div>
        </div>

        <!-- 주문 상세 모달 -->
        <div id="order-detail-modal" onclick="if(event.target === this) closeOrderDetailModal()" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
            <div style="background: var(--bg-primary); padding: 2rem; border-radius: var(--radius-lg); width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; border: 4px solid var(--border); box-shadow: 12px 12px 0px var(--shadow); position: relative;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 3px solid var(--border); padding-bottom: 1rem;">
                    <h2 style="margin: 0; font-family: 'Righteous', display; text-transform: uppercase;">주문 상세 정보</h2>
                    <button onclick="closeOrderDetailModal()" style="background: var(--text-primary); color: var(--bg-primary); border: 2px solid var(--border); border-radius: 50%; font-size: 1.5rem; cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 2px 2px 0px var(--shadow); transition: all 0.2s;">&times;</button>
                </div>
                <div id="order-detail-loading" style="text-align: center; padding: 2rem; font-weight: 800; font-size: 1.2rem;">
                    로딩 중... <span class="skeleton" style="display:inline-block; width:50px; height:1rem; border-radius: 4px; border: 2px solid var(--border);"></span>
                </div>
                <div id="order-detail-content" style="display: none;">
                    <!-- 상세 정보 표시 영역 -->
                </div>
            </div>
        </div>

        <script>
            // 현재 사용자 정보
            let currentUser = null;
            let orders = [];
            let selectedOrderUid = null;
            // 세션 동안 주문별 결제 식별자 캐시 (결제 직후 취소 버튼 연계를 위해 사용)
            let orderPaymentUidMap = {};

            function getSelectedOrderUidFromQuery() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    return params.get('orderUid');
                } catch (e) {
                    return null;
                }
            }

            // backend CommonResponse 래핑 제거 유틸
            function unwrapCommonResponse(response) {
                if (!response || typeof response !== 'object' || Array.isArray(response)) return response;
                const looksLikeCommonResponse =
                    response.data !== undefined &&
                    (response.success !== undefined || response.message !== undefined || response.status !== undefined);
                if (!looksLikeCommonResponse) return response;
                return response.data;
            }

            // API 목록 동적 생성
            async function populateApiList() {}

            // 페이지 로드 시 초기화
            document.addEventListener('DOMContentLoaded', async () => {
                populateApiList();
                selectedOrderUid = getSelectedOrderUidFromQuery();
                await loadCurrentUser();
                await loadOrders();
            });

            // 사용자 정보 로드
            async function loadCurrentUser() {
                try {
                    // /api/auth/me 이중 호출 방지: auth-check.js의 getSharedCurrentUser 활용
                    const raw = await (typeof getSharedCurrentUser === 'function' ? getSharedCurrentUser() : makeApiRequest('get-current-user', {}));
                    currentUser = unwrapCommonResponse(raw);

                    if (!validateApiResponse('get-current-user', currentUser)) {
                        console.warn('API 응답 형식이 올바르지 않게 스키마에 정의되어 있을 수 있습니다.');
                    }
                } catch (error) {
                    console.error('Failed to load user info:', error);
                    currentUser = null;
                }
            }

            // 주문 목록 로드
            async function loadOrders() {
                const loadingEl = document.getElementById('order-list-loading');
                const containerEl = document.getElementById('order-list-container');
                const emptyEl = document.getElementById('order-list-empty');

                loadingEl.style.display = 'block';
                containerEl.style.display = 'none';
                emptyEl.style.display = 'none';

                try {
                    const raw = await makeApiRequest('list-orders', {});
                    const result = unwrapCommonResponse(raw);

                    let orderList = [];
                    // Spring Data Page 객체인지, 리스트인지 확인
                    if (result && Array.isArray(result.content)) {
                        orderList = result.content;
                    } else if (Array.isArray(result)) {
                        orderList = result;
                    } else if (result && Array.isArray(result.orders)) {
                        orderList = result.orders;
                    } else if (result && result.orders && Array.isArray(result.orders.content)) {
                        orderList = result.orders.content;
                    }

                    if (!Array.isArray(orderList)) {
                        orders = [];
                        loadingEl.style.display = 'none';
                        emptyEl.style.display = 'block';
                        containerEl.style.display = 'none';
                        showNotification('주문 목록을 가져오지 못했습니다.', 'error');
                        return;
                    }

                    orders = orderList;
                    loadingEl.style.display = 'none';

                    if (selectedOrderUid) {
                        const matched = orders.find(o => o.orderUid === selectedOrderUid || o.orderId === selectedOrderUid);
                        if (matched) {
                            orders = [matched];
                        } else {
                            showNotification('선택한 주문을 찾을 수 없습니다. 전체 목록을 표시합니다.', 'warning');
                        }
                    }

                    if (orders.length === 0) {
                        emptyEl.style.display = 'block';
                    } else {
                        containerEl.style.display = 'block';
                        renderOrderList();
                    }
                } catch (error) {
                    console.error('Failed to load orders:', error);
                    loadingEl.innerHTML = '<span style="color: var(--danger); font-size: 1.2rem; font-weight: 800;">주문 목록을 불러오는데 실패했습니다.</span>';
                }
            }

            // 주문 목록 렌더링
            function renderOrderList() {
                const tbody = document.getElementById('order-list-body');
                tbody.innerHTML = '';

                if (!Array.isArray(orders)) return;

                orders.forEach(order => {
                    const tr = document.createElement('tr');

                    // orderUid 또는 orderId 호환
                    const currentOrderUid = order.orderUid || order.orderId;

                    if (selectedOrderUid && String(currentOrderUid) === String(selectedOrderUid)) {
                        tr.style.background = 'var(--bg-tertiary)'; // 하이라이트
                    }

                    // 상태에 따른 스타일
                    const statusStyle = getStatusStyle(order.status || order.orderStatus);

                    // 포인트 정보 구성
                    const usedPoint = Number(order.usedPoint || 0) || 0;
                    const totalAmountNum = Number(order.totalAmount || order.totalPrice || 0) || 0;
                    // 0원이 falsy값으로 처리되지 않도록 ?? 연산자 사용
                    const finalAmountNum = Number(order.paymentPrice ?? (totalAmountNum - usedPoint));

                    let pointsDisplay = '';
                    if (usedPoint > 0) {
                        pointsDisplay = `<div style="font-size: 0.875rem; color: var(--danger); font-weight: 800; border: 2px solid var(--danger); padding: 0.1rem 0.3rem; display: inline-block; border-radius: var(--radius-sm); border-style: dashed;">- ${usedPoint.toLocaleString()}P</div>`;
                    } else {
                        pointsDisplay = '<span style="color: var(--text-secondary); font-size: 1rem; font-weight: 800;">-</span>';
                    }

                    const safeOrderNumber = order.orderNumber || currentOrderUid;
                    const safeStatusText = getStatusText(order.status || order.orderStatus);

                    tr.innerHTML = `
                        <td style="padding: 1rem; font-weight: 800; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border);">
                            <a href="#" onclick="openOrderDetailModal('${currentOrderUid}'); return false;" style="color: var(--primary); text-decoration: underline; text-underline-offset: 4px; border-bottom: 2px solid transparent; transition: all 0.2s;" onmouseover="this.style.background='var(--text-primary)'; this.style.color='var(--bg-primary)';" onmouseout="this.style.background='transparent'; this.style.color='var(--primary)';">
                                ${safeOrderNumber}
                            </a>
                        </td>
                        <td style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right;">
                            <div style="font-weight: 800; font-size: 1.1rem;">${totalAmountNum.toLocaleString()}원</div>
                            ${usedPoint > 0 ? `<div style="font-size: 0.8rem; color: var(--primary); font-weight: 700; margin-top: 0.2rem;">실결제: ${finalAmountNum.toLocaleString()}원</div>` : ''}
                        </td>
                        <td style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right;">
                            ${pointsDisplay}
                        </td>
                        <td style="padding: 1rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: center;">
                            <span style="display: inline-block; padding: 0.3rem 0.8rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 800; border: 2px solid var(--border); box-shadow: 2px 2px 0px var(--shadow); ${statusStyle}">
                                ${safeStatusText}
                            </span>
                        </td>
                        <td style="padding: 1rem; text-align: center; border-bottom: 3px solid var(--border);">
                            ${buildOrderActionButton(order, finalAmountNum)}
                        </td>
                    `;

                    tbody.appendChild(tr);
                });
            }

            // 주문 결제하기
            async function payOrder(orderId, totalAmount) {
                if (!currentUser) {
                    showNotification('⚠️ 사용자 정보를 먼저 로드해주세요', 'warning');
                    return;
                }

                const order = orders.find(o => String(o.orderUid) === String(orderId) || String(o.orderId) === String(orderId));
                if (!order) {
                    showNotification('⚠️ 주문을 찾을 수 없습니다', 'error');
                    return;
                }

                // 결제 시작 API(/api/orders/{orderId}/payments)는 Long orderId 기준으로만 호출
                const paymentOrderId = order.orderId ?? orderId;
                if (paymentOrderId === undefined || paymentOrderId === null || Number.isNaN(Number(paymentOrderId))) {
                    showNotification('⚠️ 결제에 필요한 orderId가 없어 요청할 수 없습니다', 'error');
                    return;
                }

                // 0원이 falsy값으로 무시되지 않고 0으로 평가되도록 nullish coalescing(??) 사용
                const finalTotalAmount = Number(order.paymentPrice ?? totalAmount);

                if (finalTotalAmount <= 0) {
                    try {
                        // 1. 서버에 전액 포인트(0원) 결제 시작 요청 (DB에 결제 내역 PENDING 정보 생성)
                        const createResult = await makeApiRequest('create-payment', {
                            pathParams: { orderId: Number(paymentOrderId) },
                            body: { payment_price: 0 }
                        });
                        
                        const createData = createResult?.data ?? {};
                        const serverPaymentId = createData.paymentId || createData.paymentsId || createData.id;
                        
                        if (!serverPaymentId) {
                            throw new Error('결제 ID를 생성하지 못했습니다.');
                        }
                        
                        // 2. 포트원 창을 띄우지 않고 곧바로 결제 확정(검증) API 호출
                        await makeApiRequest('confirm-payment', {
                            pathParams: serverPaymentId
                        });

                        showNotification('전액 포인트 결제가 완료되었습니다!', 'success');
                        await loadOrders();
                    } catch (error) {
                        console.error('Payment failed (0-won bypass):', error);
                        showNotification(`전액 결제 처리 실패: ${error.message || '알 수 없는 오류'}`, 'error');
                    }
                    return;
                }

                try {
                    const paymentData = {
                        orderId: String(paymentOrderId),
                        orderName: `주문 ${order.orderNumber || orderId}`,
                        totalAmount: finalTotalAmount,
                        currency: 'KRW',
                        payMethod: 'CARD',
                        customer: {
                            customerId: String(currentUser.customerUid || currentUser.id || 'CUST_001'),
                            fullName: currentUser.name || '방문자',
                            phoneNumber: currentUser.phone || '01012345678',
                            email: currentUser.email || 'test@test.com'
                        }
                    };

                    const result = await openPortOnePayment(paymentData);

                    if (!result.paymentId) {
                        throw new Error('결제 결과에 paymentId가 없습니다.');
                    }

                    // 결제창 성공 직후 서버 결제 검증 호출
                    const confirmRaw = await makeApiRequest('confirm-payment', {
                        pathParams: result.paymentId
                    });
                    const confirmData = unwrapCommonResponse(confirmRaw);

                    const confirmedOrderId = confirmData?.orderId ?? orderId;
                    const paymentStatus = confirmData?.status ?? 'UNKNOWN';
                    orderPaymentUidMap[orderId] = result.paymentId;
                    showNotification(`💳 결제 검증 완료! (상태: ${paymentStatus})`, 'success');

                    await loadOrders();
                } catch (error) {
                    console.error('Payment failed:', error);
                    showNotification(`결제 처리 실패: ${error.message || '알 수 없는 오류'}`, 'error');
                }
            }

            function buildOrderActionButton(order, finalAmountNum) {
                const orderUid = order.orderUid || order.orderId;
                const status = order.status || order.orderStatus;

                if (status === 'PENDING' || status === '결제 대기') {
                    return `<button class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="payOrder('${order.orderId || orderUid}', ${finalAmountNum})">
                                💳 결제하기
                            </button>`;
                }

                if (status === 'PAID' || status === '결제 완료' || status === '주문 완료') {
                    return `<button class="btn" style="padding: 0.5rem 1rem; font-size: 0.85rem; background: #34D399; color: var(--text-primary);" onclick="confirmOrder('\${orderUid}')">
                                ✅ 주문확정
                            </button>`;
                }

                if (status === 'CONFIRMED' || status === '주문 확정') {
                    return `<span style="display: inline-block; padding: 0.4rem 0.8rem; color: var(--text-primary); background: #E5E7EB; border: 2px dashed var(--border); font-weight: 800; font-size: 0.85rem; border-radius: var(--radius-sm);">
                                ✅ 결제완료
                            </span>`;
                }

                return `<span style="color: var(--text-secondary); font-size: 1rem; font-weight: 800;">-</span>`;
            }

            async function confirmOrder(orderUid) {
                try {
                    const raw = await makeApiRequest('confirm-order', {
                        pathParams: orderUid
                    });
                    const data = unwrapCommonResponse(raw);

                    const orderNumber = data?.orderNumber ?? '-';
                    const status = data?.status ?? 'CONFIRMED';
                    showNotification(`주문 확정 성공! (상태: ${status})`, 'success');
                    await loadOrders();
                } catch (error) {
                    console.error('Failed to confirm order:', error);
                    showNotification(`주문 확정 실패: ${error.message || '알 수 없는 오류'}`, 'error');
                }
            }

            // 상태 스타일 반환 (Pop Art Style)
            function getStatusStyle(status) {
                const styles = {
                    'PENDING': 'background: #FEF08A; color: var(--text-primary);',
                    'PAID': 'background: #6EE7B7; color: var(--text-primary);',
                    'CONFIRMED': 'background: #93C5FD; color: var(--text-primary);',
                    'REFUNDED': 'background: #FCA5A5; color: var(--text-primary);',
                    'FAILED': 'background: #D1D5DB; color: var(--text-primary);',
                    '결제 대기': 'background: #FEF08A; color: var(--text-primary);',
                    '결제 완료': 'background: #6EE7B7; color: var(--text-primary);',
                    '주문 완료': 'background: #6EE7B7; color: var(--text-primary);',
                    '주문 확정': 'background: #93C5FD; color: var(--text-primary);',
                    '환불 완료': 'background: #FCA5A5; color: var(--text-primary);'
                };
                return styles[status] || 'background: var(--bg-primary); color: var(--text-primary);';
            }

            // 상태 텍스트 반환
            function getStatusText(status) {
                const texts = {
                    'PENDING': '결제 대기',
                    'PAID': '결제 완료',
                    'CONFIRMED': '주문 확정',
                    'REFUNDED': '환불 완료',
                    'FAILED': '결제 실패'
                };
                return texts[status] || status;
            }

            // 주문 상세 모달 열기
            async function openOrderDetailModal(orderUid) {
                document.getElementById('order-detail-modal').style.display = 'flex';
                document.getElementById('order-detail-loading').style.display = 'block';
                document.getElementById('order-detail-content').style.display = 'none';

                // Allow 100ms for browser to render modal before api block
                setTimeout(async () => {
                    try {
                        let finalOrderUid = orderUid;
                        let raw;
                        try {
                            // client-api-config.yml 에 매핑된 'get-order' (/api/orders/{orderId}) API를 실제로 호출합니다.
                            raw = await makeApiRequest('get-order', { pathParams: { orderId: finalOrderUid } });
                        } catch(e) { 
                            console.error('Failed to fetch get-order API from backend:', e);
                        }

                        let data = unwrapCommonResponse(raw);

                        // If API failed or data not found, try to use order list item data
                        if (!data && orders) {
                            data = orders.find(o => String(o.orderUid) === String(orderUid) || String(o.orderId) === String(orderUid));
                            if (data && !data.items) {
                                // generate mock items based on totalPrice if no items exists in list order view
                                data.items = [{ productName: '구매 상품', price: data.totalAmount || data.totalPrice, quantity: 1 }];
                            }
                        }

                        if (!data) throw new Error('조회된 데이터가 없습니다.');

                        // normalize keys
                        const dOrderUid = data.orderUid || data.orderId || finalOrderUid;
                        const dStatus = data.status || data.orderStatus || 'PENDING';
                        const dTotalAmount = Number(data.totalAmount || data.totalPrice || 0);

                        const contentEl = document.getElementById('order-detail-content');

                        // 주문 상품 목록 렌더링
                        let itemsHtml = '';
                        const orderItemsList = data.orderItems || data.items || [];
                        if (orderItemsList.length > 0) {
                            itemsHtml = `
                                <h3 style="margin-top: 2rem; margin-bottom: 1rem; font-family: 'Righteous', display; font-size: 1.25rem; border-bottom: 4px solid var(--border); padding-bottom: 0.5rem; text-transform: uppercase;">주문 상품</h3>
                                <table style="width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 1.5rem; border: 3px solid var(--border); border-radius: var(--radius-sm); box-shadow: 4px 4px 0px var(--shadow);">
                                    <thead>
                                        <tr style="background: var(--text-primary); color: var(--bg-primary);">
                                            <th style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: left;">상품명</th>
                                            <th style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right;">단가</th>
                                            <th style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); text-align: right;">소계</th>
                                            <th style="padding: 0.75rem; border-bottom: 3px solid var(--border); text-align: right;">수량</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                            `;
                            orderItemsList.forEach(item => {
                                const unitPrice = Number(item.productPrice || item.price || dTotalAmount);
                                const qty = Number(item.quantity || 1);
                                const subtotal = Number(item.subtotalPrice || (unitPrice * qty));
                                
                                itemsHtml += `
                                    <tr style="background: var(--bg-primary);">
                                        <td style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); font-weight: 700;">${item.productName || item.productId || '상품'}</td>
                                        <td style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); font-weight: 700; text-align: right; color: var(--text-secondary);">${unitPrice.toLocaleString()}원</td>
                                        <td style="padding: 0.75rem; border-bottom: 3px solid var(--border); border-right: 3px solid var(--border); font-weight: 800; text-align: right; color: var(--primary);">${subtotal.toLocaleString()}원</td>
                                        <td style="padding: 0.75rem; border-bottom: 3px solid var(--border); font-weight: 700; text-align: right;">${qty}개</td>
                                    </tr>
                                `;
                            });
                            itemsHtml += `</tbody></table>`;
                        }

                        const paymentInfo = data.paymentUid ? `<br><strong>결제 UID:</strong> <span style="font-family: monospace; font-size: 0.9em; background: var(--bg-primary); padding: 0.2rem 0.4rem; border: 2px solid var(--border); border-radius: var(--radius-sm); font-weight: bold;">${data.paymentUid}</span>` : '';

                        let actionHtml = '';
                        if (!data.paymentUid && (dStatus === 'PENDING' || dStatus === '결제 대기')) {
                            actionHtml = `<div style="text-align: right; margin-top: 1.5rem;"><button class="btn" style="background: #FCD34D; color: var(--text-primary);" onclick="cancelOrderFromModal('${dOrderUid}')">주문취소</button></div>`;
                        } else if (data.paymentUid || dStatus === 'PAID' || dStatus === '결제 완료' || dStatus === '주문 완료') {
                            const pUid = data.paymentUid || orderPaymentUidMap[dOrderUid];
                            if (pUid) {
                                actionHtml = `<div style="text-align: right; margin-top: 1.5rem;"><button class="btn" style="background: #FCA5A5; color: var(--text-primary);" onclick="cancelPaymentFromModal('${pUid}')">결제취소/환불</button></div>`;
                            }
                        }

                        const formattedDate = (data.createdAt || data.orderedCreatedAt) ? new Date(data.createdAt || data.orderedCreatedAt).toLocaleString() : new Date().toLocaleString();

                        contentEl.innerHTML = `
                            <div style="background: var(--bg-tertiary); padding: 1.5rem; border-radius: var(--radius-md); margin-bottom: 1.5rem; line-height: 2; border: 3px dashed var(--border); box-shadow: inset 2px 2px 0px var(--shadow);">
                                <strong>주문 번호:</strong> <span style="font-weight: 800; font-size: 1.1rem; color: var(--primary);">${data.orderNumber || dOrderUid}</span><br>
                                <strong>상태:</strong> <span style="display: inline-block; padding: 0.3rem 0.8rem; border-radius: var(--radius-sm); font-size: 0.9rem; font-weight: 800; border: 2px solid var(--border); box-shadow: 2px 2px 0px var(--shadow); ${getStatusStyle(dStatus)}">${getStatusText(dStatus)}</span><br>
                                <strong>주문 일시:</strong> <span style="font-weight: 700;">${formattedDate}</span>
                                ${paymentInfo}
                            </div>
                            ${itemsHtml}
                            <div style="text-align: right; font-size: 1.3rem; margin-top: 2rem; padding-top: 1.5rem; border-top: 4px solid var(--border); font-weight: 800;">
                                <strong>총 주문 금액:</strong> <span style="color: var(--primary); background: var(--bg-tertiary); padding: 0.4rem 1rem; border: 3px solid var(--border); border-radius: var(--radius-sm); box-shadow: 3px 3px 0px var(--shadow);">${dTotalAmount.toLocaleString()}원</span>
                            </div>
                            ${actionHtml}
                        `;

                        document.getElementById('order-detail-loading').style.display = 'none';
                        contentEl.style.display = 'block';

                    } catch (error) {
                        console.error('Failed to load order details:', error);
                        document.getElementById('order-detail-loading').innerHTML = '<span style="color: var(--danger); font-size: 1.2rem; font-weight: 800;">주문 상세 정보를 불러오는데 실패했습니다.</span>';
                    }
                }, 100);
            }

            // 주문 상세 모달 닫기
            function closeOrderDetailModal() {
                const modal = document.getElementById('order-detail-modal');
                modal.style.transition = "opacity 0.2s ease";
                modal.style.opacity = "0";
                setTimeout(() => {
                    modal.style.display = 'none';
                    modal.style.opacity = "1";
                }, 200);
            }

            // 모달 내 주문 취소
            async function cancelOrderFromModal(orderUid) {
                if (!confirm('정말 이 주문을 취소하시겠습니까?')) return;
                try {
                    const raw = await makeApiRequest('cancel-order', { pathParams: orderUid });
                    showNotification('주문 취소 성공!', 'success');
                    closeOrderDetailModal();
                    await loadOrders();
                } catch (error) {
                    console.error('Failed to cancel order:', error);
                    showNotification('주문 취소 실패', 'error');
                }
            }

            // 모달 내 결제 취소
            async function cancelPaymentFromModal(paymentUid) {
                if (!confirm('정말 이 결제를 취소/환불하시겠습니까?')) return;
                try {
                    const raw = await makeApiRequest('cancel-payment', {
                        pathParams: paymentUid,
                        body: { reason: 'Customer request' }
                    });
                    showNotification('결제 취소 성공!', 'success');
                    closeOrderDetailModal();
                    await loadOrders();
                } catch (error) {
                    console.error('Failed to cancel payment:', error);
                    showNotification('결제 취소 실패', 'error');
                }
            }
        </script>
    </div>
</body>
</html>
